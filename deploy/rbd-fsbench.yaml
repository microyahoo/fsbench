---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fsbench-server
  namespace: fsbench
  labels:
    app: fsbench-server
    stack: fsbench
    type: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fsbench-server
  template:
    metadata:
      labels:
        app: fsbench-server
        stack: fsbench
        type: server
    spec:
      hostNetwork: true
      containers:
        - name: gobench-server
          image: reg.deeproute.ai/deeproute-public/tools/fsbench-server:latest # need update
          imagePullPolicy: Always
          env:
          - name: CONFIGFILE
            value: "/config/config.yaml"
          - name: SERVERPORT
            value: "2000"
          - name: DEBUG
            value: "true"
          - name: TRACE
            value: "true"
          ports:
            - containerPort: 2000
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
          - name: config
            mountPath: /config/
      volumes:
      - name: config
        configMap:
          name: fsbench-config
---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: fsbench-worker
  namespace: fsbench
  labels:
    k8s-app: fsbench-worker
spec: 
  replicas: 3 # need modify
  serviceName: app
  selector:
    matchLabels:
      name: fsbench-worker
  template:
    metadata:
      labels:
        name: fsbench-worker
    spec:
      containers:
        - name: fsbench-worker
          image: reg.deeproute.ai/deeproute-public/tools/fsbench-worker:latest # need update
          imagePullPolicy: "Always"
          env:
          - name: CLIENT_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: FSBENCH_IN_CONTAINER
            value: "true"
          - name: PROMETHEUSPORT
            value: "8888"
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: SERVERADDRESS
            value: "fsbench-server:2000"
          - name: DEBUG
            value: "false"
          - name: TRACE
            value: "true"
          # resources:
          #   limits:
          #     memory: 200Mi
          #     cpu: 200m
          #   requests:
          #     cpu: 10m
          #     memory: 10Mi
          ports:
            - containerPort: 8888
              hostPort:  7777  # expose as host port
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
          # - mountPath: /dev
          #   name: devices
          # - mountPath: /run/udev
          #   name: udev
          # - mountPath: /rootfs
          #   name: rootfs
          #   readOnly: false
          #   mountPropagation: HostToContainer
          - name: vol
            mountPath: /volume/
  volumeClaimTemplates:
  - metadata:
      name: vol
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: csi-rbd-sc  # need modify
      resources:
        requests:
          storage: 40Ti  # need modify



---
apiVersion: v1
kind: Service
metadata:
  name: fsbench-server
  namespace: fsbench
  labels:
    app: fsbench-server
    stack: fsbench
spec:
  type: NodePort
  ports:
    - name: fsbench-server
      port: 2000
      targetPort: 2000
  selector:
    app: fsbench-server

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fsbench-config
  namespace: fsbench
data:
  config.yaml: |
    report_config:
      format: csv # csv, md or html
      bucket: test
      s3_config:
        access_key: testy
        secret_key: testy
        region: us-east-1
        endpoint: http://10.3.8.31:80
        skipSSLverify: true

    global_config:
      reorder_tasks: false # having a different node read/stat back data than wrote it
      anchor: /volume
      direct_io: true
      threads: [8, 16, 32, 64, 128, 256]
      operations: ["write", "read", "stat", "delete"] # NOTE: When performing read/stat/delete operations, ensure that the file exists
      workers: 3  # need modify

    tests:
      - name: 4k
        fsd:
          # anchor: /volume  # override global value
          # direct_io: true  # override global value
          depth: 6
          width: 3
          files: 2000
          size: 4k
        fwd:
          # operations: ["write", "read", "stat", "delete"] # NOTE: When performing read/stat/delete operations, ensure that the file exists
          block_size: 4k
          threads: [16, 32, 64, 128, 256]   # override global value
        clear_dirs: true
